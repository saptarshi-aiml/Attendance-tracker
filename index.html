<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1>📊 Attendance Tracker</h1>

<script src="script.js"></script>
</body>
</html>
